repos:
  # ── Standard file hygiene ──────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements

  # ── Ruff — lint + format (replaces flake8, black, isort) ──────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff            # linter
        args: [--fix]
      - id: ruff-format     # formatter

  # ── Local: run tests before committing ─────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q --no-header
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
